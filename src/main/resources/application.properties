spring.application.name=expense-tracker

# MongoDB Configuration (set MONGODB_URI in Railway environment variables)
# Fallback to empty string if not set - app will handle connection gracefully
spring.data.mongodb.uri=${MONGODB_URI:}

# Server Configuration - Dynamic port from Railway (default to 8081)
server.port=${PORT:8081}

# Production-ready error handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=${SERVER_ERROR_INCLUDE_STACKTRACE:false}
server.error.include-exception=${SERVER_ERROR_INCLUDE_EXCEPTION:false}

# Jackson configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Actuator endpoints (optional, for monitoring)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
